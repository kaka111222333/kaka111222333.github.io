# 示例 .github/workflows/sync-epg.yml
name: Auto Sync EPG

on:
  schedule:
    # 设置每天定时执行，例如在UTC时间0点（北京时间8点）运行
    - cron: '0 0 * * *'
  # 也可以添加手动触发
  workflow_dispatch:

jobs:
  sync-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }} # 关键修改：使用您的PAT来检出代码

      - name: Download EPG file
        run: |
          # 使用curl下载EPG文件，-L跟随重定向
          curl -L -o ./seven-days.xml.gz https://raw.githubusercontent.com/plsy1/epg/main/e/seven-days.xml.gz

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

- name: Commit and Push changes
        run: |
          # 强制删除已存在的文件（如果存在），以确保后续添加的是新文件
          rm -f ./seven-days.xml.gz
          # 重新下载文件
          curl -L -o ./seven-days.xml.gz https://raw.githubusercontent.com/plsy1/epg/main/e/seven-days.xml.gz
          
          # 添加文件到暂存区
          git add ./seven-days.xml.gz
          # 提交更改，使用时间戳确保每次提交信息都不同
          git commit -m "强制更新EPG文件 $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          # 推送到远程仓库
          git push origin HEAD:master
