# 示例 .github/workflows/sync-epg.yml
name: Auto Sync EPG

on:
  schedule:
    # 设置每天定时执行，例如在UTC时间0点（北京时间8点）运行
    - cron: '0 0 * * *'
  # 也可以添加手动触发
  workflow_dispatch:

jobs:
  sync-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }} # 关键修改：使用您的PAT来检出代码

      - name: Download EPG file
        run: |
          # 使用curl下载EPG文件，-L跟随重定向
          curl -L -o ./seven-days.xml.gz https://raw.githubusercontent.com/plsy1/epg/main/e/seven-days.xml.gz

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Commit and Push changes
        run: |
          # 检查文件是否有变化
          if git diff --quiet; then
            echo "没有新变化，无需提交。"
            exit 0
          fi
          # 添加、提交并推送更改
          git add ./seven-days.xml.gz
          git commit -m "自动更新EPG文件 $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git push origin HEAD:master
